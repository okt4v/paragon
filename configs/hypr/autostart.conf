# ── Autostart ─────────────────────────────────────────────────────────────────

# Status bar
exec-once = waybar

# Wallpaper daemon + initial dashboard render
exec-once = swww-daemon
exec-once = sleep 2 && python3 ~/.local/share/paragon/scripts/dashboard.py

# Notifications
exec-once = mako

# Keyring
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets

# Night light
exec-once = hyprsunset -t 4500

# Mullvad VPN (tray icon via waybar module — daemon is a systemd service)
exec-once = mullvad-gui

# XDG portal
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
