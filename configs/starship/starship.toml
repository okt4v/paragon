# ── Paragon Starship prompt ───────────────────────────────────────────────────
# Minimal, fast, informative

format = """
$directory\
$git_branch\
$git_status\
$python\
$rust\
$nodejs\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
format = " [$symbol$branch]($style) "
style = "bold #94a3b8"
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold #5eead4"
conflicted = "󰩠 "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = " "
stashed = " "
modified = " "
staged = " "
renamed = " "
deleted = " "

# ── Languages ─────────────────────────────────────────────────────────────────
[python]
format = "[ $version]($style) "
style = "#facc15"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]

[rust]
format = "[ $version]($style) "
style = "#f97316"

[nodejs]
format = "[ $version]($style) "
style = "#4ade80"
detect_files = ["package.json", ".nvmrc"]

# ── Docker ────────────────────────────────────────────────────────────────────
[docker_context]
format = "[ $context]($style) "
style = "#38bdf8"
only_with_files = true

# ── Command duration ──────────────────────────────────────────────────────────
[cmd_duration]
format = "[ $duration]($style) "
style = "#64748b"
min_time = 2_000

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold #5eead4)"
error_symbol = "[❯](bold #f43f5e)"
vimcmd_symbol = "[❮](bold #a78bfa)"

# ── Disabled modules ──────────────────────────────────────────────────────────
[package]
disabled = true

[line_break]
disabled = false
