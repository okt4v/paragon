# ── General layout ────────────────────────────────────────────────────────────
general {
  gaps_in = 4
  gaps_out = 10
  border_size = 1
  col.active_border   = rgba(ff6600ff) rgba(ffaa00ff) 45deg
  col.inactive_border = rgba(1a1a1aff)
  layout = dwindle
  resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────────────────────────
decoration {
  rounding = 2
  active_opacity   = 1.0
  inactive_opacity = 0.92

  blur {
    enabled = true
    size = 4
    passes = 2
  }

  shadow {
    enabled = true
    range = 8
    render_power = 2
    color = rgba(00000088)
  }
}

# ── Animations ────────────────────────────────────────────────────────────────
animations {
  enabled = true

  bezier = snap,    0.0, 0.9, 0.1, 1.0
  bezier = release, 0.9, 0.0, 1.0, 0.1
  bezier = punch,   0.05, 0.9, 0.1, 1.05

  animation = windows,    1, 3, punch,   slide
  animation = windowsOut, 1, 2, release, slide
  animation = border,     1, 5, default
  animation = borderangle,1, 8, default
  animation = fade,       1, 3, default
  animation = workspaces, 1, 3, snap,    slide
}

# ── Layout ────────────────────────────────────────────────────────────────────
dwindle {
  pseudotile    = true
  preserve_split = true
}

master {
  new_on_top = false
}
