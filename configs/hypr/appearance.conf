# ── General layout ────────────────────────────────────────────────────────────
general {
  gaps_in = 4
  gaps_out = 10
  border_size = 2
  col.active_border = rgba(5eead4ff) rgba(0ea5e9ff) 45deg
  col.inactive_border = rgba(1e293baa)
  layout = dwindle
  resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────────────────────────
decoration {
  rounding = 8
  active_opacity = 1.0
  inactive_opacity = 0.95

  blur {
    enabled = true
    size = 6
    passes = 2
  }

  shadow {
    enabled = true
    range = 12
    render_power = 2
    color = rgba(00000055)
  }
}

# ── Animations ────────────────────────────────────────────────────────────────
animations {
  enabled = true

  bezier = easeOut, 0.0, 0.9, 0.1, 1.0
  bezier = easeIn, 0.9, 0.0, 1.0, 0.1
  bezier = overshot, 0.05, 0.9, 0.1, 1.1

  animation = windows, 1, 4, overshot, slide
  animation = windowsOut, 1, 3, easeIn, slide
  animation = border, 1, 6, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 4, default
  animation = workspaces, 1, 4, easeOut, slide
}

# ── Layout ────────────────────────────────────────────────────────────────────
dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_on_top = false
}
