# ── Paragon Starship — Bloomberg black/orange ─────────────────────────────────

format = """
$directory\
$git_branch\
$git_status\
$python\
$rust\
$nodejs\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold #ff6600"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
format = " [$symbol$branch]($style) "
style = "bold #555555"
symbol = " "

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold #ffaa00"
conflicted = "󰩠 "
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
untracked  = " "
stashed    = " "
modified   = " "
staged     = " "
renamed    = " "
deleted    = " "

[python]
format = "[ $version]($style) "
style = "#ffaa00"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version", "Pipfile"]

[rust]
format = "[ $version]($style) "
style = "#ff6600"

[nodejs]
format = "[ $version]($style) "
style = "#00dd55"
detect_files = ["package.json", ".nvmrc"]

[docker_context]
format = "[ $context]($style) "
style = "#3399ff"
only_with_files = true

[cmd_duration]
format = "[ $duration]($style) "
style = "#333333"
min_time = 2_000

[character]
success_symbol = "[❯](bold #ff6600)"
error_symbol   = "[❯](bold #ff2233)"
vimcmd_symbol  = "[❮](bold #ffaa00)"

[package]
disabled = true
