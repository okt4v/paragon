# ── Variables ─────────────────────────────────────────────────────────────────
$mod = SUPER
$terminal = ghostty
$launcher = wofi --show drun --allow-images
$browser = firefox
$filemanager = nautilus

# ── Applications ──────────────────────────────────────────────────────────────
bind = $mod, Return, exec, $terminal
bind = $mod, D, exec, $launcher
bind = $mod, B, exec, $browser
bind = $mod, E, exec, $filemanager

# ── Window management ─────────────────────────────────────────────────────────
bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod, SPACE, togglefloating
bind = $mod, P, pseudo
bind = $mod, V, togglesplit

# ── Focus (vim-style) ─────────────────────────────────────────────────────────
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# ── Move windows (vim-style) ──────────────────────────────────────────────────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# ── Resize windows ────────────────────────────────────────────────────────────
bind = $mod CTRL, H, resizeactive, -40 0
bind = $mod CTRL, L, resizeactive, 40 0
bind = $mod CTRL, K, resizeactive, 0 -40
bind = $mod CTRL, J, resizeactive, 0 40

# ── Workspaces ────────────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1

# Special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# ── Screenshots ───────────────────────────────────────────────────────────────
# Full screen to clipboard
bind = , Print, exec, sh -c 'grim - | wl-copy'
# Region select to clipboard  (SUPER+SHIFT+C)
bind = $mod SHIFT, C, exec, sh -c 'grim -g "$(slurp)" - | wl-copy'
# Region select to file       (SUPER+SHIFT+P)
bind = $mod SHIFT, P, exec, sh -c 'mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png'

# ── System ────────────────────────────────────────────────────────────────────
bind = $mod, Escape, exec, hyprlock
bind = $mod SHIFT, E, exit

# ── Media / volume ────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = , XF86AudioMute, exec, pamixer -t
bindl  = , XF86AudioPlay, exec, playerctl play-pause
bindl  = , XF86AudioNext, exec, playerctl next
bindl  = , XF86AudioPrev, exec, playerctl previous

# ── Brightness ────────────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Mouse binds ───────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
